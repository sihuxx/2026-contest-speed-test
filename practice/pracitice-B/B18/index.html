<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>이미지 편집기</h1>

  <div>
    <input type="file" class="fileInput" accept="image/*">
  </div>

  <div class="editArea">
    <p class="placeholder">이미지를 선택하면 여기에 표시됩니다</p>
    <canvas class="canvas" style="display: none;"></canvas>
  </div>

  <div class="toolbar">
    <button data-type="rotate-left">좌측 90도 회전</button>
    <button data-type="rotate-right">우측 90도 회전</button>
    <button data-type="flip-h">좌우 반전</button>
    <button data-type="flip-v">상하 반전</button>
    <button data-type="filter-gray">흑백 필터</button>
    <button data-type="reset">초기화</button>
    <button data-type="download">다운로드</button>
  </div>
</body>
<script src="../lib/lib.js"></script>
<script src="./script/01.js"></script>
</html>
