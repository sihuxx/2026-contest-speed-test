<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Real 3D Flip Book - Split Images</title>
  <style>
    :root {
      --w: 550px;
      --h: 650px;
      --anim: 1s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    * {
      margin: 0;
      padding: 0;
      list-style: none;
      box-sizing: border-box;
    }

    .page>* {
      height: var(--h) !important;
      width: var(--w) !important; 
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #2c3e50;
      font-family: sans-serif;
    }

    input {
      display: none;
    }

    .scene {
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2000px;
      position: relative;
    }

    .book-container {
      width: var(--w);
      height: var(--h);
      position: relative;
      transform-style: preserve-3d;
    }

    /* ── 배경 이미지 공통 설정 ── */
    .page-face,
    .outter-book {
      /* 이미지를 페이지 2개 분량으로 키움 */
      background-size: calc(var(--w) * 2) var(--h);
      background-repeat: no-repeat;
    }

    .outter-book.left {
      width: var(--w);
      height: var(--h);
      z-index: 0;
      /* 왼쪽 페이지는 이미지의 왼쪽 절반 표시 */
      background-position: left;
    }

    .outter-book.right {
      position: absolute;
      inset: 0;
      border-radius: 0 5px 5px 0;
      z-index: 0;
      /* 오른쪽 페이지는 이미지의 오른쪽 절반 표시 */
      background-position: right;
    }

    .page {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform var(--anim), z-index 0s var(--anim);
    }

    .page-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
    }

    .front {
      background-position: right;
      /* 오른쪽 절반 */
    }

    .back {
      transform: rotateY(180deg);
      border-radius: 5px 0 0 5px;
      background-position: left;
      /* 왼쪽 절반 */
    }

    /* ── 페이지별 이미지 연결 ── */
    /* 1번 이미지: 고정 왼쪽 커버 + 1페이지 앞면 */
    .outter-book.left,
    .p1 .front {
      background-image: url('./images/abu-dhabi.jpg');
    }

    /* 2번 이미지: 1페이지 뒷면 + 2페이지 앞면 */
    .p1 .back,
    .p2 .front {
      background-image: url('./images/kazan.jpg');
    }

    /* 3번 이미지: 2페이지 뒷면 + 3페이지 앞면 */
    .p2 .back,
    .p3 .front {
      background-image: url('./images/lyon.jpg');
    }

    /* 4번 이미지: 3페이지 뒷면 + 4페이지 앞면 */
    .p3 .back,
    .p4 .front {
      background-image: url('./images/sao-paulo.jpg');
    }

    /* 5번 이미지: 4페이지 뒷면 + 5페이지 앞면 */
    .p4 .back,
    .p5 .front {
      background-image: url('./images/shanghai.jpg');
    }

    /* 6번 이미지: 5페이지 뒷면 + 고정 오른쪽 뒷표지 */
    .p5 .back,
    .outter-book.right {
      background-image: url('./images/abu-dhabi.jpg');
    }

    /* ── 나머지 로직 (동일) ── */
    .p1 {
      z-index: 5;
    }

    .p2 {
      z-index: 4;
    }

    .p3 {
      z-index: 3;
    }

    .p4 {
      z-index: 2;
    }

    .p5 {
      z-index: 1;
    }

    #s2:checked~.scene .p1,
    #s3:checked~.scene .p1,
    #s3:checked~.scene .p2,
    #s4:checked~.scene .p1,
    #s4:checked~.scene .p2,
    #s4:checked~.scene .p3,
    #s5:checked~.scene .p1,
    #s5:checked~.scene .p2,
    #s5:checked~.scene .p3,
    #s5:checked~.scene .p4 {
      transform: rotateY(-180deg) scale(1.0);
      z-index: 10;
    }

    .controls {
      position: absolute;
      top: 110%;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 12px 25px;
      background: #000000;
      color: #ffffff;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      user-select: none;
      display: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: #000000;
      transform: scale(1.05);
    }

    #s1:checked~.scene .controls .next-1, #s1:checked~.scene .controls .prev-1 {
      display: block;
    }

    #s2:checked~.scene .controls .prev-2,
    #s2:checked~.scene .controls .next-2 {
      display: block;
    }

    #s3:checked~.scene .controls .prev-3,
    #s3:checked~.scene .controls .next-3 {
      display: block;
    }

    #s4:checked~.scene .controls .prev-4,
    #s4:checked~.scene .controls .next-4 {
      display: block;
    }

    #s5:checked~.scene .controls .prev-5,
    #s5:checked~.scene .controls .next-5 {
      display: block;
    }

    .yel-background {
      position: absolute;
      width: 102%;
      height: 104%;
      background: #ffc933;
      z-index: -2;
    }
  </style>
</head>

<body>

  <input type="radio" name="p" id="s1" checked>
  <input type="radio" name="p" id="s2">
  <input type="radio" name="p" id="s3">
  <input type="radio" name="p" id="s4">
  <input type="radio" name="p" id="s5">

  <div class="scene">
    <div class="outter-book left"></div>

    <div class="book-container">
      <div class="page p1">
        <div class="page-face front"></div>
        <div class="page-face back"></div>
      </div>
      <div class="page p2">
        <div class="page-face front"></div>
        <div class="page-face back"></div>
      </div>
      <div class="page p3">
        <div class="page-face front"></div>
        <div class="page-face back"></div>
      </div>
      <div class="page p4">
        <div class="page-face front"></div>
        <div class="page-face back"></div>
      </div>
      <div class="page p5">
        <div class="page-face front"></div>
        <div class="page-face back"></div>
      </div>

      <div class="outter-book right"></div>
    </div>

    <div class="controls">
       <label for="s1" class="btn prev-1">❮</label><label for="s2" class="btn next-1">❯</label>
      <label for="s1" class="btn prev-2">❮</label><label for="s3" class="btn next-2">❯</label>
      <label for="s2" class="btn prev-3">❮</label><label for="s4" class="btn next-3">❯</label>
      <label for="s3" class="btn prev-4">❮</label><label for="s5" class="btn next-4">❯</label>
      <label for="s4" class="btn prev-5">❮</label><label for="s2" class="btn next-5">❯</label>
    </div>

    <div class="yel-background"></div>
  </div>

</body>

</html>
