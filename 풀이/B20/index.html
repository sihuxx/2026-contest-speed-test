<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>틱택토 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>틱택토 게임</h1>
        
        <div class="game-board " id="gameBoard">
            <div class="cell" data-type="r1,c1,d1" data-index="0"></div>
            <div class="cell" data-type="r1,c2" data-index="1"></div>
            <div class="cell" data-type="r1,c3,d2" data-index="2"></div>

            <div class="cell" data-type="r2,c1" data-index="3"></div>
            <div class="cell" data-type="r2,c2,d1,d2" data-index="4"></div>
            <div class="cell" data-type="r2,c3" data-index="5"></div>

            <div class="cell" data-type="r3,c1,d2" data-index="6"></div>
            <div class="cell" data-type="r3,c2" data-index="7"></div>
            <div class="cell" data-type="r3,c3,d1" data-index="8"></div>
        </div>

        <div class="game-controls">
            <button id="resetGame" class="btn btn-primary" onclick="location.reload()">게임 리셋</button>
        </div>

    </div>
    <script src="./common.js"></script>
</body>
</html>
