<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Flip Book Carousel</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2e3440;
  }

  input[type=radio] { display: none; }

  /* ── 골드 액자 ── */
  .frame {
    padding: 18px;
    background: linear-gradient(135deg, #e8c84a 0%, #c9a227 30%, #f0d060 50%, #c9a227 70%, #a07010 100%);
    border-radius: 4px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,200,0.5),
      inset 0 -2px 4px rgba(0,0,0,0.4),
      0 12px 60px rgba(0,0,0,.8),
      0 4px 16px rgba(0,0,0,.5);
  }

  /* ── 뷰포트 ── */
  .vp {
    width: 920px;
    height: 680px;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* ── 공통 슬라이드 레이어 ── */
  .slide {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    pointer-events: none;
  }

  /* ── 각 페이지 ── */
  .page {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* BG 레이어: 뒤에 깔림 */
  .bg-layer {
    z-index: 1;
    visibility: hidden;
  }

  /* FG 레이어: 앞에서 접히는 페이지 */
  .fg-layer {
    z-index: 2;
    transform-origin: left center;
    transform: rotateY(-100deg);
    opacity: 0;
    pointer-events: none;
    /* perspective를 fg-layer 부모가 아닌 여기서 직접 줌 */
    perspective: 1200px;
    perspective-origin: left center;
  }

  /* fg 내부 실제 flip 패널 */
  .fg-layer .panel {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    transform: rotateY(0deg);
  }

  /* fg-layer 자체 transition */
  .fg-layer {
    transition:
      opacity 0s,
      transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* 페이지 안쪽 그림자 (접힐 때 깊이감) */
  .fg-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(0,0,0,0) 70%, rgba(0,0,0,0.45) 100%);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.85s ease;
  }

  /* ── 활성 페이지: bg 표시, fg 펼침 ── */
  #s1:checked ~ .frame .vp .page-1 .bg-layer,
  #s2:checked ~ .frame .vp .page-2 .bg-layer,
  #s3:checked ~ .frame .vp .page-3 .bg-layer,
  #s4:checked ~ .frame .vp .page-4 .bg-layer,
  #s5:checked ~ .frame .vp .page-5 .bg-layer {
    visibility: visible;
    z-index: 1;
  }

  #s1:checked ~ .frame .vp .page-1 .fg-layer,
  #s2:checked ~ .frame .vp .page-2 .fg-layer,
  #s3:checked ~ .frame .vp .page-3 .fg-layer,
  #s4:checked ~ .frame .vp .page-4 .fg-layer,
  #s5:checked ~ .frame .vp .page-5 .fg-layer {
    opacity: 1;
    transform: rotateY(0deg);
    pointer-events: auto;
  }

  /* ── 전환: sN+1 체크 → 이전 page-N fg가 왼쪽으로 접힘 ── */
  #s2:checked ~ .frame .vp .page-1 .bg-layer { visibility: visible; z-index: 3; }
  #s2:checked ~ .frame .vp .page-1 .fg-layer {
    opacity: 1;
    transform: rotateY(-100deg);
    z-index: 4;
  }
  #s2:checked ~ .frame .vp .page-1 .fg-layer::after { opacity: 1; }
  #s2:checked ~ .frame .vp .page-2 .bg-layer { z-index: 2; }

  #s3:checked ~ .frame .vp .page-2 .bg-layer { visibility: visible; z-index: 3; }
  #s3:checked ~ .frame .vp .page-2 .fg-layer {
    opacity: 1;
    transform: rotateY(-100deg);
    z-index: 4;
  }
  #s3:checked ~ .frame .vp .page-2 .fg-layer::after { opacity: 1; }
  #s3:checked ~ .frame .vp .page-3 .bg-layer { z-index: 2; }

  #s4:checked ~ .frame .vp .page-3 .bg-layer { visibility: visible; z-index: 3; }
  #s4:checked ~ .frame .vp .page-3 .fg-layer {
    opacity: 1;
    transform: rotateY(-100deg);
    z-index: 4;
  }
  #s4:checked ~ .frame .vp .page-3 .fg-layer::after { opacity: 1; }
  #s4:checked ~ .frame .vp .page-4 .bg-layer { z-index: 2; }

  #s5:checked ~ .frame .vp .page-4 .bg-layer { visibility: visible; z-index: 3; }
  #s5:checked ~ .frame .vp .page-4 .fg-layer {
    opacity: 1;
    transform: rotateY(-100deg);
    z-index: 4;
  }
  #s5:checked ~ .frame .vp .page-4 .fg-layer::after { opacity: 1; }
  #s5:checked ~ .frame .vp .page-5 .bg-layer { z-index: 2; }

  /* 순환: s1 → page-5 접힘 */
  #s1:checked ~ .frame .vp .page-5 .bg-layer { visibility: visible; z-index: 3; }
  #s1:checked ~ .frame .vp .page-5 .fg-layer {
    opacity: 1;
    transform: rotateY(-100deg);
    z-index: 4;
  }
  #s1:checked ~ .frame .vp .page-5 .fg-layer::after { opacity: 1; }

  /* ── 접힐 때 측면 그림자 오버레이 ── */
  .fold-shadow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: linear-gradient(to right,
      rgba(0,0,0,0.0) 0%,
      rgba(0,0,0,0.0) 50%,
      rgba(0,0,0,0.35) 100%
    );
    opacity: 0;
    transition: opacity 0.85s ease;
  }

  #s2:checked ~ .frame .vp .page-1 .fold-shadow,
  #s3:checked ~ .frame .vp .page-2 .fold-shadow,
  #s4:checked ~ .frame .vp .page-3 .fold-shadow,
  #s5:checked ~ .frame .vp .page-4 .fold-shadow,
  #s1:checked ~ .frame .vp .page-5 .fold-shadow {
    opacity: 1;
  }

  /* ── 뒤에 깔리는 페이지 왼쪽 가장자리 그림자 ── */
  .bg-layer::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(to right, rgba(0,0,0,0.3), transparent);
    z-index: 2;
    pointer-events: none;
  }

  /* ── 버튼 ── */
  .nav {
    position: absolute;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 220px;
    z-index: 30;
    pointer-events: auto;
  }
  .nav label {
    width: 52px; height: 52px;
    background: rgba(15,15,15,.72);
    border-radius: 4px;
    color: #fff; font-size: 1.6rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15);
    transition: background .2s, transform .15s;
    user-select: none;
  }
  .nav label:hover {
    background: rgba(70,70,70,.9);
    transform: scale(1.08);
  }
  .nav label:active { transform: scale(0.96); }

  #s1:checked ~ .frame .vp .nav1,
  #s2:checked ~ .frame .vp .nav2,
  #s3:checked ~ .frame .vp .nav3,
  #s4:checked ~ .frame .vp .nav4,
  #s5:checked ~ .frame .vp .nav5 { display: flex; }

  /* ── 페이지 번호 인디케이터 ── */
  .indicator {
    position: absolute;
    bottom: 52px; left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 8px;
    z-index: 30;
  }
  .indicator span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    display: block;
    transition: background 0.3s, transform 0.3s;
  }

  #s1:checked ~ .frame .vp .ind1,
  #s2:checked ~ .frame .vp .ind2,
  #s3:checked ~ .frame .vp .ind3,
  #s4:checked ~ .frame .vp .ind4,
  #s5:checked ~ .frame .vp .ind5 { display: flex; }

  #s1:checked ~ .frame .vp .ind1 span:nth-child(1),
  #s2:checked ~ .frame .vp .ind2 span:nth-child(2),
  #s3:checked ~ .frame .vp .ind3 span:nth-child(3),
  #s4:checked ~ .frame .vp .ind4 span:nth-child(4),
  #s5:checked ~ .frame .vp .ind5 span:nth-child(5) {
    background: #fff;
    transform: scale(1.3);
  }
</style>
</head>
<body>

<input type="radio" name="sl" id="s1" checked>
<input type="radio" name="sl" id="s2">
<input type="radio" name="sl" id="s3">
<input type="radio" name="sl" id="s4">
<input type="radio" name="sl" id="s5">

<div class="frame">
  <div class="vp">

    <div class="page page-1">
      <div class="slide bg-layer">
        <img src="images/abu-dhabi.jpg" alt="2">
        <div class="fold-shadow"></div>
      </div>
      <div class="slide fg-layer"><img src="images/kazan.jpg" alt="1"></div>
    </div>

    <div class="page page-2">
      <div class="slide bg-layer">
        <img src="images/lyon.jpg" alt="3">
        <div class="fold-shadow"></div>
      </div>
      <div class="slide fg-layer"><img src="images/abu-dhabi.jpg" alt="2"></div>
    </div>

    <div class="page page-3">
      <div class="slide bg-layer">
        <img src="images/sao-paulo.jpg" alt="4">
        <div class="fold-shadow"></div>
      </div>
      <div class="slide fg-layer"><img src="images/lyon.jpg" alt="3"></div>
    </div>

    <div class="page page-4">
      <div class="slide bg-layer">
        <img src="images/shanghai.jpg" alt="5">
        <div class="fold-shadow"></div>
      </div>
      <div class="slide fg-layer"><img src="images/sao-paulo.jpg" alt="4"></div>
    </div>

    <div class="page page-5">
      <div class="slide bg-layer">
        <img src="images/kazan.jpg" alt="1">
        <div class="fold-shadow"></div>
      </div>
      <div class="slide fg-layer"><img src="images/shanghai.jpg" alt="5"></div>
    </div>

    <!-- 버튼 -->
    <div class="nav nav1"><label for="s5">&#8249;</label><label for="s2">&#8250;</label></div>
    <div class="nav nav2"><label for="s1">&#8249;</label><label for="s3">&#8250;</label></div>
    <div class="nav nav3"><label for="s2">&#8249;</label><label for="s4">&#8250;</label></div>
    <div class="nav nav4"><label for="s3">&#8249;</label><label for="s5">&#8250;</label></div>
    <div class="nav nav5"><label for="s4">&#8249;</label><label for="s1">&#8250;</label></div>

    <!-- 인디케이터 -->
    <div class="indicator ind1"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="indicator ind2"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="indicator ind3"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="indicator ind4"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="indicator ind5"><span></span><span></span><span></span><span></span><span></span></div>

  </div>
</div>

</body>
</html>
