
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.scene {
  width: 100%;
  height: 560px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #E8E8E8;
  border-radius: 24px;
  perspective: 900px;
  perspective-origin: 50% 35%;
}
.stack-wrap {
  position: relative;
  width: 240px;
  height: 310px;
  transform-style: preserve-3d;
  transform: rotateX(12deg);
}
.card {
  position: absolute;
  top: 0; left: 0;
  width: 240px;
  height: 310px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.34,1.35,0.64,1), opacity 0.5s ease, box-shadow 0.5s ease;
  will-change: transform;
}
.card-label {
  font-size: 16px;
  font-weight: 500;
  color: rgba(255,255,255,0.95);
  letter-spacing: 0.02em;
}
.card-bar {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.3);
}
.c1 { background: linear-gradient(155deg, #F4623A 0%, #E8395A 55%, #C0256B 100%); }
.c2 { background: linear-gradient(155deg, #7B5EEA 0%, #9B6FEF 50%, #B87FF5 100%); }
.c3 { background: linear-gradient(155deg, #1AC8A0 0%, #0FB5C7 50%, #0E9FE0 100%); }
.nav-row {
  display: flex;
  gap: 24px;
  margin-top: 56px;
  z-index: 10;
}
.nav-btn {
  padding: 11px 36px;
  border-radius: 50px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: #fff;
  color: #1a1a1a;
  box-shadow: 0 2px 14px rgba(0,0,0,0.13);
  transition: transform 0.15s, box-shadow 0.15s;
}
.nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(0,0,0,0.17); }
.nav-btn:active { transform: scale(0.96); }
.dots {
  display: flex;
  gap: 7px;
  margin-top: 22px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(0,0,0,0.2);
  transition: background 0.3s, transform 0.3s;
}
.dot.on { background: #444; transform: scale(1.35); }
</style>

<div class="scene">
  <div class="stack-wrap" id="sw"></div>
  <div class="dots" id="dots"></div>
  <div class="nav-row">
    <button class="nav-btn" id="prev">이전</button>
    <button class="nav-btn" id="next">다음</button>
  </div>
</div>

<script>
const CARDS = [
  { label: 'Card 1', cls: 'c1' },
  { label: 'Card 2', cls: 'c2' },
  { label: 'Card 3', cls: 'c3' },
];

const N = CARDS.length;
let active = 0;
let busy = false;

const sw = document.getElementById('sw');
const dotsEl = document.getElementById('dots');
const els = [];
const dotEls = [];

CARDS.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = `card ${c.cls}`;
  el.innerHTML = `<span class="card-label">${c.label}</span><div class="card-bar"></div>`;
  sw.appendChild(el);
  els.push(el);
});

CARDS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' on' : '');
  dotsEl.appendChild(d);
  dotEls.push(d);
});

function getState(cardIdx, activeIdx) {
  const rel = (cardIdx - activeIdx + N) % N;
  if (rel === 0) {
    return {
      tx: 0, ty: -30, tz: 120,
      ry: 0, rx: 0,
      scale: 1,
      opacity: 1,
      shadow: '0 40px 80px rgba(0,0,0,0.42)',
      z: 30
    };
  } else if (rel === 1) {
    return {
      tx: 8, ty: 22, tz: -60,
      ry: -8, rx: 0,
      scale: 0.91,
      opacity: 0.82,
      shadow: '0 14px 36px rgba(0,0,0,0.22)',
      z: 20
    };
  } else {
    return {
      tx: 16, ty: 60, tz: -200,
      ry: -15, rx: 0,
      scale: 0.82,
      opacity: 0.58,
      shadow: '0 6px 16px rgba(0,0,0,0.13)',
      z: 10
    };
  }
}

function apply(immediate) {
  els.forEach((el, i) => {
    const s = getState(i, active);
    if (immediate) {
      el.style.transition = 'none';
    } else {
      el.style.transition = 'transform 0.7s cubic-bezier(0.34,1.35,0.64,1), opacity 0.5s ease, box-shadow 0.5s ease';
    }
    el.style.transform = `translateX(${s.tx}px) translateY(${s.ty}px) translateZ(${s.tz}px) rotateY(${s.ry}deg) scale(${s.scale})`;
    el.style.opacity = s.opacity;
    el.style.boxShadow = s.shadow;
    el.style.zIndex = s.z;
  });
  dotEls.forEach((d, i) => {
    d.className = 'dot' + (i === active ? ' on' : '');
  });
}

apply(true);
requestAnimationFrame(() => requestAnimationFrame(() => apply(false)));

function go(dir) {
  if (busy) return;
  busy = true;

  const leavingEl = els[active];
  const flipDir = dir > 0 ? 1 : -1;

  leavingEl.style.transition = 'transform 0.3s cubic-bezier(0.55,0,1,0.45), opacity 0.25s ease';
  leavingEl.style.transform = `translateX(${flipDir * 90}px) translateY(-50px) translateZ(160px) rotateY(${flipDir * 50}deg) scale(0.85)`;
  leavingEl.style.opacity = 0;

  const prevActive = active;
  active = (active + dir + N) % N;

  dotEls.forEach((d, i) => {
    d.className = 'dot' + (i === active ? ' on' : '');
  });

  setTimeout(() => {
    const s = getState(prevActive, active);
    leavingEl.style.transition = 'none';
    leavingEl.style.transform = `translateX(${s.tx}px) translateY(${s.ty}px) translateZ(${s.tz}px) rotateY(${s.ry}deg) scale(${s.scale})`;
    leavingEl.style.opacity = 0;
    leavingEl.style.zIndex = s.z;

    requestAnimationFrame(() => {
      els.forEach((el, i) => {
        if (i === prevActive) return;
        const st = getState(i, active);
        el.style.transition = 'transform 0.7s cubic-bezier(0.34,1.35,0.64,1), opacity 0.5s ease, box-shadow 0.5s ease';
        el.style.transform = `translateX(${st.tx}px) translateY(${st.ty}px) translateZ(${st.tz}px) rotateY(${st.ry}deg) scale(${st.scale})`;
        el.style.opacity = st.opacity;
        el.style.boxShadow = st.shadow;
        el.style.zIndex = st.z;
      });
      setTimeout(() => {
        const sf = getState(prevActive, active);
        leavingEl.style.transition = 'opacity 0.4s ease';
        leavingEl.style.opacity = sf.opacity;
        setTimeout(() => { busy = false; }, 500);
      }, 100);
    });
  }, 300);
}

document.getElementById('prev').addEventListener('click', () => go(-1));
document.getElementById('next').addEventListener('click', () => go(1));
</script>
