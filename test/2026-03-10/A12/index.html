<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .circle {width: 30px;height: 30px;border-radius: 50%;position: absolute;}
    .circle1{animation: c1 2s infinite;background-color: red;}
    .circle2{animation: c2 2s infinite;background-color: yellow;}
    .circle3{animation: c3 2s infinite;background-color: greenyellow;}
    .circle4{animation: c4 2s infinite;background-color: blue;}
    @keyframes c1 {
      0% {transform: translate(0px, 0px);}
      25% {transform: translate(-50px, 0px);}
      50% {transform: translate(-50px, 50px);}
      75% {transform: translate(0px, 50px);}
      100% {transform: translate(0px, 0px);}
    } 
    @keyframes c2 {
      0% {transform: translate(-50px, 0);}
      25% {transform: translate(-50px, 50px);}
      50% {transform: translate(0px, 50px);}
      75% {transform: translate(0px, 0px);}
      100% {transform: translate(-50px, 0px);}
    }
    @keyframes c3 {
      0% {transform: translate(-50px, 50px);}
      25% {transform: translate(0px, 50px);}
      50% {transform: translate(0px, 0px);}
      75% {transform: translate(-50px, 0px);}
      100% {transform: translate(-50px, 50px);}
    }
    @keyframes c4 {
      0% {transform: translate(0px, 50px);}
      25% {transform: translate(0px, 0px);}
      50% {transform: translate(-50px, 0px);}
      75% {transform: translate(-50px, 50px);}
      100% {transform: translate(0px, 50px);}
    }
  </style>
</head>
<body class="center">
<div class="box">
    <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>
  <div class="circle circle4"></div>
</div>
</body>
</html>
