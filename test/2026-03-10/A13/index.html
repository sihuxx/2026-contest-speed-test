<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .modal {background-color: white;z-index: 1000; display: none;flex-direction: column;gap: 20px;justify-content: center;align-items: center;padding: 40px;border: 1px solid black;position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);}
    .modal > div {display: flex;align-items: center;}
    [for="login"] {position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);}
    label {cursor: pointer;}
    #login:checked ~ .modal {display: flex;}
    body:has(#close:checked) .modal {display: none;}
  </style>
</head>

<body class="center">
  <input type="radio" name="l" id="login" hidden>
  <input type="radio" name="l" id="close" hidden>
 
  <label for="login">로그인</label>
  <div class="modal">
    <p>
      계정 로그인
      안전한 서비스를 위해 로그인이 필요합니다.
      <br>
      계속하려면 아래에 등록된 이메일과 비밀번호를 입력해주세요.
      <br>
      로그인 계속
    </p>
    <label for="close">닫기</label>
  </div>
</body>

</html>
