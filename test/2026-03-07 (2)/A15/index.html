<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/style.css">
  <style>
    ul{display: grid;grid-template-columns: repeat(4, 1fr);gap: 30px;}
    @media (min-width: 768px) and (max-width: 1023px) {
      ul{grid-template-columns: repeat(2, 1fr);}
    }
    @media (max-width: 767px) {
      ul{grid-template-columns: repeat(1, 1fr);}
    }
  </style>
</head>
<body class="center">
  <ul>
    <img src="./card1.jpg" alt=""><img src="./card2.jpg" alt=""><img src="./card3.jpg" alt=""><img src="./card4.jpg" alt="">
  </ul>
</body>
</html>
