<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../lib/lib.css">
    <style>
        body {transition: .3s;}
        body:has(#mode:checked) {background-color: #222;}
        .box {display: flex;align-items: center; background-color: gray; width: 150px;height: 60px;border-radius: 30px;}
        #mode:checked ~ .box {background-color: darkblue;} 
        #mode:checked ~ .box > label {transform: translateX(100px);background-color: yellow;}
        label {transition: .3s; border-radius: 50%; display: block; width: 50px;height: 50px;background-color: white;}
    </style>
</head>
<body class="center">
    <input type="checkbox" name="" id="mode" hidden>
    <div class="box">
        <label for="mode"></label>
    </div>
</body>
</html>
